name: Daily DET content

# 毎日 GitHub のサーバーで実行（Mac の電源/スリープに無関係）。
# 20:07 UTC = 05:07 JST。手動実行(workflow_dispatch)も可能。
on:
  schedule:
    - cron: "7 20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk

      - name: Generate daily content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-daily.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/daily-questions.json public/daily-photo.json public/daily-photo.jpg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily content $(date -u +%F)"
            git push
          fi
